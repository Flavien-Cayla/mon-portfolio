<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets Illustrator - Flavien CAYLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #fbbf24;
            /* Amber/Orange */
            --secondary-color: #f59e0b;
            /* Bright Orange */
            --accent-color: #b45309;
            /* Dark Orange */
            --bg-color: #1a1005;
            /* Very Dark Orange/Black */
        }

        body {
            animation: revealSlice 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .project-details {
            padding-top: 120px;
        }

        .gallery-grid {
            column-count: 3;
            column-gap: 2rem;
            margin-bottom: 4rem;
        }

        @media (max-width: 1024px) {
            .gallery-grid {
                column-count: 2;
            }
        }

        @media (max-width: 768px) {
            .gallery-grid {
                column-count: 1;
            }
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-media {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
        }

        .pdf-preview {
            width: 100%;
            height: 400px;
            border: none;
        }

        .gallery-info {
            padding: 1.5rem;
        }

        .gallery-title {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: var(--secondary-color);
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: var(--primary-color);
            transform: translateX(-5px);
        }
    </style>
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
        <div class="globe globe-3"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;"><span class="logo-f">F</span>C.</a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="index.html#projects">Projets</a></li>
            <li><a href="index.html#cv">CV</a></li>
            <li><a href="index.html#contact" class="btn-contact">Contact</a></li>
        </ul>
    </nav>

    <section class="section project-details">
        <div class="container">
            <a href="index.html#projects" class="back-btn"><i class="fas fa-arrow-left"></i> Retour aux projets</a>

            <div class="section-header">
                <h1 class="section-title" style="text-align: left; margin-bottom: 1rem;">Illustrator <span
                        class="gradient-text">Projects</span></h1>
                <p class="subtitle" style="margin: 0 0 3rem 0; text-align: left; opacity: 1;">Créations vectorielles et
                    design graphiques.</p>
            </div>

            <div class="gallery-grid">


                <!-- Image 2: Requin -->
                <div class="gallery-item">
                    <img src="imageAI/requinrrêt.jpg" alt="Requin Illustration" class="gallery-media">
                    <div class="gallery-info">
                        <h3 class="gallery-title">Requin</h3>
                        <p style="color: var(--secondary-color);">Illustration détaillée.</p>
                    </div>
                </div>

                <!-- PDF: Autoportrait -->
                <div class="gallery-item">
                    <embed src="imageAI/autoportrai.pdf" type="application/pdf" class="pdf-preview">
                    <!-- Backup link if embed doesn't work well on mobile/some browsers -->
                    <div class="gallery-info">
                        <h3 class="gallery-title">Autoportrait</h3>
                        <p style="color: var(--secondary-color);">Format PDF. <a href="imageAI/autoportrai.pdf"
                                target="_blank" style="color: var(--primary-color); text-decoration: underline;">Ouvrir
                                le PDF</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer id="contact">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">Flavien CAYLA</div>
                <div class="social-links">
                    <a href="https://www.linkedin.com/in/flavien-cayla-9aa9b92a9" target="_blank"><i
                            class="fab fa-linkedin"></i></a>
                    <a href="#" onclick="showContact('flactori@gmail.com'); return false;"><i
                            class="fas fa-envelope"></i></a>
                    <a href="#" onclick="showContact('06 47 38 80 89'); return false;"><i class="fas fa-phone"></i></a>
                </div>
                <p class="copyright">&copy; 2026 Flavien CAYLA. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
