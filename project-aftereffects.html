<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets After Effects - Flavien CAYLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #818cf8;
            /* Indigo */
            --secondary-color: #6366f1;
            /* Deep Indigo */
            --accent-color: #4338ca;
            /* Dark Indigo */
            --bg-color: #050511;
            /* Very Dark Indigo/Black */
        }

        .project-details {
            padding-top: 120px;
        }

        /* Pinterest Layout */
        .gallery-grid {
            column-count: 3;
            column-gap: 2rem;
            margin-bottom: 4rem;
        }

        @media (max-width: 1024px) {
            .gallery-grid {
                column-count: 2;
            }
        }

        @media (max-width: 600px) {
            .gallery-grid {
                column-count: 1;
            }
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        body {
            animation: revealPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-media {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #000;
        }

        .gallery-info {
            padding: 1.5rem;
        }

        .gallery-title {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: var(--secondary-color);
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: var(--primary-color);
            transform: translateX(-5px);
        }
    </style>
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
        <div class="globe globe-3"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;"><span class="logo-f">F</span>C.</a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="index.html#projects">Projets</a></li>
            <li><a href="index.html#cv">CV</a></li>
            <li><a href="index.html#contact" class="btn-contact">Contact</a></li>
        </ul>
    </nav>

    <section class="section project-details">
        <div class="container">
            <a href="index.html#projects" class="back-btn"><i class="fas fa-arrow-left"></i> Retour aux projets</a>

            <div class="section-header">
                <h1 class="section-title" style="text-align: left; margin-bottom: 1rem;">After Effects <span
                        class="gradient-text">Projects</span></h1>
                <p class="subtitle" style="margin: 0 0 3rem 0; text-align: left; opacity: 1;">Motion design et effets
                    spéciaux.</p>
            </div>

            <div class="gallery-grid">
                <!-- Video 1: Epouvante -->
                <div class="gallery-item">
                    <video class="gallery-media" controls>
                        <source src="VideoAe/Epouvante.mp4" type="video/mp4">
                        Votre navigateur ne supporte pas la lecture de vidéos.
                    </video>
                    <div class="gallery-info">
                        <h3 class="gallery-title">Epouvante</h3>
                        <p style="color: var(--secondary-color);">Création d'ambiance et effets.</p>
                    </div>
                </div>

                <!-- Video 2: Ecran -->
                <div class="gallery-item">
                    <video class="gallery-media" controls>
                        <source src="VideoAe/écran.mp4" type="video/mp4">
                        Votre navigateur ne supporte pas la lecture de vidéos.
                    </video>
                    <div class="gallery-info">
                        <h3 class="gallery-title">Écran</h3>
                        <p style="color: var(--secondary-color);">Animation et design graphique.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer id="contact">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">Flavien CAYLA</div>
                <div class="social-links">

                            class="fab fa-linkedin"></i></a>
                    <a href="#" onclick="showContact('flactori@gmail.com'); return false;"><i

                </div>
                <p class="copyright">&copy; 2026 Flavien CAYLA. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
